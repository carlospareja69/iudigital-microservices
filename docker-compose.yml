services:

  core-service:
    build: ./core-service
    container_name: core_service
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/iudigital_core
    depends_on:
      - mongodb

  # INSTANCIA 1
  project_service_1:
    build: ./project-service
    container_name: project_service_1
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/iudigital_projects
    depends_on:
      - mongodb

  # INSTANCIA 2
  project_service_2:
    build: ./project-service
    container_name: project_service_2
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/iudigital_projects
    depends_on:
      - mongodb

  # INSTANCIA 3
  project_service_3:
    build: ./project-service
    container_name: project_service_3
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/iudigital_projects
    depends_on:
      - mongodb

  #  NGINX (BALANCEADOR)
  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - project_service_1
      - project_service_2
      - project_service_3

  # MONGO
  mongodb:
    image: mongo:7
    container_name: iudigital_micro_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  